version: '3.8'

services:
  postgresdb:
    image: postgres:18
    container_name: postgresdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: employeedb
    networks:
        - springboot-postgres-network

  employee-service:
    container_name: employee-service
    build:
        context: .
        dockerfile: Dockerfile
    ports:
      - "8086:8086"
    networks:
        - springboot-postgres-network
    depends_on:
      - postgresdb
    restart: on-failure

networks:
    springboot-postgres-network:
